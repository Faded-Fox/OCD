    <meta name="description" content="Private, local-only ERP session tracker: trends and patterns from exposure therapy sessions, for you and your specialist." />
    <title>ERP Insights</title>
    <script type="text/javascript">
      // Decode the redirect encoded by 404.html back into a real path before the
      // router mounts. See https://github.com/rafgraph/spa-github-pages
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
