<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ERP Insights</title>
    <script type="text/javascript">
      // GitHub Pages serves static files with no server-side rewrites, so a direct
      // visit or refresh on a client-side route (e.g. /OCD/session/abc) 404s here.
      // Re-encode the path into a query string and redirect to index.html, which
      // decodes it back before the router mounts. See https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1 // "/OCD"

      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
